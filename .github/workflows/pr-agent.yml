name: PR Agent with Memory
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: write
    steps:
      - name: Get changed files
        id: files
        uses: tj-actions/changed-files@v44
        with:
          separator: ","

      - name: Get memory context from dashboard
        id: memory
        run: |
          FILES="${{ steps.files.outputs.all_changed_files }}"
          RESPONSE=$(curl -s "http://65.21.62.152:8000/memory?repo=${{ github.repository }}&pr=${{ github.event.number }}&files=$FILES")
          CONTEXT=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('context',''))")
          echo "context<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: the-pr-agent/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          OPENAI.API_BASE: "https://api.scaleway.ai/v1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          config.model: "qwen3-coder-30b-a3b-instruct"
          config.fallback_models: '["qwen3-coder-30b-a3b-instruct"]'
          pr_reviewer.model: "qwen3-coder-30b-a3b-instruct"
          pr_reviewer.extra_instructions: ${{ steps.memory.outputs.context }}
