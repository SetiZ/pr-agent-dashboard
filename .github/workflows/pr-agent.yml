name: PR Agent
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: the-pr-agent/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          OPENAI.API_BASE: "https://api.scaleway.ai/${{ secrets.SCALEWAY_PROJECT_ID }}/v1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          config.model: ${{ vars.PR_AGENT_MODEL }}
          config.custom_model_max_tokens: ${{ vars.PR_AGENT_MAX_TOKENS }}
          pr_reviewer.model: ${{ vars.PR_AGENT_MODEL }}
          pr_reviewer.persistent_comment: "false"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
