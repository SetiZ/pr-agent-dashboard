name: PR Agent with Memory
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get changed files
        id: files
        uses: tj-actions/changed-files@v44
        with:
          separator: ","

      - name: Get memory context from dashboard
        id: memory
        run: |
          FILES="${{ steps.files.outputs.all_changed_files }}"
          RESPONSE=$(curl -s "http://65.21.62.152:8000/memory?repo=${{ github.repository }}&pr=${{ github.event.number }}&files=$FILES")
          CONTEXT=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('context',''))")
          echo "context<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: the-pr-agent/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          OPENAI.API_BASE: "https://api.scaleway.ai/${{ secrets.SCALEWAY_PROJECT_ID }}/v1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          config.model: "gemma-4-26b-a4b-it"
          config.fallback_models: '["gemma-4-26b-a4b-it"]'
          config.custom_model_max_tokens: "32768"
          pr_reviewer.model: "gemma-4-26b-a4b-it"
          pr_reviewer.extra_instructions: ${{ steps.memory.outputs.context }}
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
