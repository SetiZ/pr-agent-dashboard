name: "Get Memory Context"
description: "Fetch memory context for a PR from the dashboard"
inputs:
  dashboard-url:
    required: true
    description: "Dashboard base URL"
  repo:
    required: true
    description: "Repository full name (e.g. owner/repo)"
  pr-number:
    required: true
    description: "Pull request number"
  files:
    required: true
    description: "Comma-separated list of changed files"
outputs:
  context:
    description: "Memory context string for PR agent extra_instructions"
    value: ${{ steps.fetch.outputs.context }}
runs:
  using: "composite"
  steps:
    - id: fetch
      shell: bash
      env:
        DASHBOARD_URL: ${{ inputs.dashboard-url }}
        REPO: ${{ inputs.repo }}
        PR_NUMBER: ${{ inputs.pr-number }}
        FILES: ${{ inputs.files }}
      run: |
        CONTEXT=$(python3 -c "
        import os, urllib.parse, urllib.request, json
        params = urllib.parse.urlencode({'repo': os.environ['REPO'], 'pr_number': os.environ['PR_NUMBER'], 'files': os.environ['FILES']})
        url = os.environ['DASHBOARD_URL'].rstrip('/') + '/memory?' + params
        response = urllib.request.urlopen(url)
        print(json.load(response).get('context', ''))
        ")
        echo "context<<EOF" >> $GITHUB_OUTPUT
        echo "$CONTEXT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
