version: "3.8"

services:
  dashboard:
    build: .
    container_name: pr-agent-dashboard
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - PR_AGENT_BOT_USERNAME=${PR_AGENT_BOT_USERNAME:-pr-agent[bot]}
      - APP_URL=${APP_URL:-http://localhost:8000}
      - DB_PATH=/data/pr_agent.db
    volumes:
      - pr-agent-data:/data
    restart: unless-stopped

volumes:
  pr-agent-data:
